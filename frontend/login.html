<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Cyrus Home</title>
<style>
:root{--bg:#1a1612;--bg2:#241e18;--bg3:#2d2620;--cream:#e8d9c0;--gold:#e8c87a;--dim:#8a7e6e;--rust:#c47a5a}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Noto Serif SC',Georgia,serif;background:var(--bg);color:var(--cream)}
body{display:flex;align-items:center;justify-content:center;padding:24px;padding-top:max(24px,env(safe-area-inset-top))}
.box{width:100%;max-width:340px;display:flex;flex-direction:column;gap:20px;align-items:center}
.title{font-size:36px;letter-spacing:6px;color:var(--gold);font-weight:300}
.sub{font-size:13px;color:var(--dim);letter-spacing:2px;margin-bottom:8px}
.field{width:100%;display:flex;flex-direction:column;gap:6px}
.label{font-size:12px;color:var(--dim);letter-spacing:1px}
input{width:100%;background:var(--bg3);border:1px solid rgba(232,200,122,.12);border-radius:14px;padding:12px 16px;color:var(--cream);font-family:inherit;font-size:15px;outline:none;transition:border-color .2s}
input:focus{border-color:var(--gold)}
button{width:100%;padding:12px;background:var(--gold);color:var(--bg);border:none;border-radius:14px;font-family:inherit;font-size:15px;cursor:pointer;letter-spacing:2px;margin-top:8px}
button:disabled{opacity:.5;cursor:not-allowed}
.error{font-size:12px;color:var(--rust);min-height:16px;text-align:center}
</style>
</head>
<body>
<div class="box">
<div class="title">Cyrus</div>
<div class="sub">家</div>
<div class="field">
<span class="label">用户名</span>
<input type="text" id="username" autocomplete="username" autocapitalize="off">
</div>
<div class="field">
<span class="label">密码</span>
<input type="password" id="password" autocomplete="current-password">
</div>
<button id="loginBtn" onclick="doLogin()">进门</button>
<div class="error" id="error"></div>
</div>
<script>
const $ = id => document.getElementById(id);
async function doLogin(){
    const username = $('username').value.trim();
    const password = $('password').value;
    if (!username || !password) {
        $('error').textContent = '用户名和密码都要填';
        return;
    }
    $('loginBtn').disabled = true;
    $('error').textContent = '';
    try {
        const r = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        });
        if (r.ok) {
            window.location.href = '/';
        } else {
            $('error').textContent = '用户名或密码不对';
            $('loginBtn').disabled = false;
        }
    } catch(e) {
        $('error').textContent = '网络出错，再试一次';
        $('loginBtn').disabled = false;
    }
}
$('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
$('username').addEventListener('keydown', e => { if (e.key === 'Enter') $('password').focus(); });
$('username').focus();
</script>
</body>
</html>
