<div class="view active" id="homeView"><div class="home-bg" id="homeBg"><svg viewBox="0 0 400 200" preserveAspectRatio="xMidYMax slice"><defs><linearGradient id="lk" x1="0" y1="0" x2="0" y2="1"><stop id="hb-lake-top" offset="0%"/><stop id="hb-lake-bot" offset="100%"/></linearGradient></defs><path class="hb-mtn-back" d="M0,100 L40,70 L80,85 L140,45 L200,80 L260,50 L320,75 L360,55 L400,70 L400,100Z" opacity=".4"/><path class="hb-mtn-front" d="M0,100 L60,65 L120,90 L180,55 L240,80 L300,60 L360,80 L400,70 L400,100Z" opacity=".7"/><path class="hb-snow" d="M130,45 L140,45 L150,55Z"/><path class="hb-snow-2" d="M250,50 L260,50 L270,60Z"/><rect y="100" width="400" height="100" fill="url(#lk)"/><path class="hb-water" d="M0,100 L60,135 L120,110 L180,145 L240,120 L300,140 L360,120 L400,130 L400,100Z"/></svg></div><button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="切换主题">☀</button><div class="home-content"><div class="home-title">Cyrus</div><div class="home-sub">这里是我们的家</div><div class="home-cards"><div class="home-card" onclick="showView('chat')"><span class="card-icon"><svg viewBox="0 0 24 24" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4 H18 A3 3 0 0 1 21 7 V13 A3 3 0 0 1 18 16 H16 L17 19 L14 16 H6 A3 3 0 0 1 3 13 V7 A3 3 0 0 1 6 4 Z"/></svg></span><div class="card-text"><div class="card-label">聊天</div><div class="card-desc">和 Cyrus 说说话</div></div></div><div class="home-card" onclick="showView('reading')"><span class="card-icon"><svg viewBox="0 0 24 24" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6c2 -1 6 -1 9 1c3 -2 7 -2 9 -1v13c-2 -1 -6 -1 -9 1c-3 -2 -7 -2 -9 -1z"/><path d="M12 7v13"/></svg></span><div class="card-text"><div class="card-label">阅读</div><div class="card-desc">一起读一本书</div></div></div><div class="home-card" onclick="showView('day')"><span class="card-icon"><svg viewBox="0 0 24 24" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 <div class="view" id="chatView"><div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div><div class="sidebar" id="sidebar"><div class="sidebar-top"><button class="new-chat-btn" onclick="newChat()">+ 新对话</button></div><div class="session-list" id="sessionList"></div><div class="bm-list" id="thinkingBmList" style="display:none"></div><div class="bm-toggle-row"><button class="bm-toggle" onclick="toggleBmList()"><svg viewBox="0 0 24 24"><path d="M6 4 H18 V21 L12 16 L6 21 Z"/></svg><span id="bmToggleLabel">收藏的思考</span></button></div><div class="profile-section"><div class="label">我的信息</div><textarea id="profileInput" placeholder="写一些关于你自己的信息..."></textarea><div style="display:flex;align-items:center"><button class="profile-save" onclick="saveProfile()">保存</button><span class="profile-saved" id="profileSaved">已保存</span></div></div></div><div class="header"><div style="display:flex;gap:4px"><button class="back-btn" onclick="showView('home')">←</button><button class="back-btn" onclick="openSidebar()" style="font-size:22px">≡</button></div><h1>Cyrus</h1><div style="width:60px"></div></div><div class="messages" id="messages"><div class="welcome">说点什么吧</div></div><div class="status-bar" id="statusBar"><span class="status-dot"></span><span class="status-text" id="statusText"></span></div><div class="attach-preview" id="attachPreview"></div><div class="edit-bar" id="editBar"><span>正在编辑消息，发送后将删除之后的对话</span><button onclick="cancelEdit()">取消</button></div><div class="chat-toolbar"><button class="pill" id="modelPill" onclick="cycleModel()">Sonnet 4.6</button><div class="toggle-wrap" id="thinkingToggle" onclick="toggleThinking()"><span class="toggle-label">思考</span><div class="toggle-track"><div class="toggle-thumb"></div></div></div><button class="pill" id="compressBtn" onclick="openSummaryModal()" title="压缩对话历史">压缩</button></div><div class="input-bar"><button class="attach-btn" onclick="document.getElementById('fileInput').click()">+</button><input type="file d="bmBody" style="display:none"></div></div><div id="readerWrap"></div><div class="r-nav"><button onclick="prevPage()">◀</button><button onclick="requestComment(currentPageText)" style="background:none;border:none;color:var(--gold-m);font-size:13px;cursor:pointer;padding:4px 8px;font-family:'Noto Serif SC',serif">评论</button><button onclick="readingGrow()" style="background:none;border:none;color:var(--gold-m);font-size:13px;cursor:pointer;padding:4px 8px;font-family:'Noto Serif SC',serif">存档</button><span class="page-info" id="pageInfo"></span><button onclick="nextPage()">▶</button></div></div><div class="comment-bubble" id="commentBubble"><button class="cb-close" onclick="hideComment()">✕</button><button onclick="favoriteComment()" id="cbFav" style="position:absolute;top:8px;right:36px;background:none;border:none;color:var(--warm);cursor:pointer;font-size:16px">♡</button><div class="cb-text" id="commentText"></div><div class="cb-tokens" id="commentTokens"></div><div style="display:flex;gap:6px;margin-top:8px"><input id="commentReply" type="text" placeholder="回复..." style="flex:1;background:var(--reply-input-bg);border:1px solid rgba(232,200,122,.15);border-radius:16px;padding:6px 12px;font-size:13px;color:var(--cream);outline:none;font-family:inherit"><button onclick="replyComment()" style="background:var(--gold);color:var(--bg);border:none;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;flex-shrink:0">↑</button></div></div><div class="highlight-bar" id="highlightBar" onclick="sendHighlight()">让 C 看看</div><div id="readingNotesPanel" style="display:none"><div class="r-header"><button class="back-btn" onclick="closeReadingNotes()">←</button><span class="r-title">读书笔记</span></div><div id="notesContent" style="padding:16px;overflow-y:auto;height:calc(100vh - 60px)"></div></div></div>

<script>
marked.setOptions({breaks:true,gfm:true});
let currentSessionId=null,thinkingEnabled=false,currentModel='claude-sonnet-4-6';
let pendingImages=[],pendingFiles=[];
let currentBook=null,rendition=null,epubBook=null,currentPageText='',selectedText='',currentCfi='',currentChapter='';
let commentTimer=null,commentMinutes=3,bookmarks=[];
const READER_FONT='-apple-system, "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", sans-serif';
function readerColors(){const cs=getComputedStyle(document.documentElement);return{bg:(cs.getPropertyValue('--bg').trim()||'#1a1612'),fg:(cs.getPropertyValue('--cream').trim()||'#e5ddd0'),accent:(cs.getPropertyValue('--gold').trim()||'#e8c87a')}}
function applyReaderTheme(){if(!rendition)return;const c=readerColors();const f=READER_FONT;rendition.themes.default({'body':{'background':c.bg+' !important','color':c.fg+' !important','font-family':f+' !important','line-height':'2.0 !important','padding':'12px 20px !important','font-size':'16px !important','letter-spacing':'0.5px !important'},'p':{'font-family':f+' !important','color':c.fg+' !important','margin-bottom':'0.8em !important'},'div':{'font-family':f+' !important','color':c.fg+' !important'},'span':{'font-family':f+' !important','color':c.fg+' !important'},'li':{'font-family':f+' !important','color':c.fg+' !important'},'a':{'color':c.accent+' !important'},'h1':{'color':c.accent+' !important','font-family':f+' !important'},'h2':{'color':c.accent+' !important','font-family':f+' !important'},'h3':{'color':c.accent+' !important','font-family':f+' !important'},'h4':{'color':c.accent+' !important','font-family':f+' !important'},'h5':{'color':c.accent+' !important','font-family':f+' !important'},'h6':{'color':c.accent+' !important','font-family':f+' !important'},'img':{'max-width':'100% !important'}});rendition.themes.override('font-family',f);rendition.themes.override('color',c.fg);rendition.themes.override('background',c.bg);rendition.themes.override('line-height','2.0');rendition.themes.override('font-size','18px');rendition.themes.override('letter-spacing','0.5px')}
function applyTheme(t){document.documentElement.dataset.theme=t;const btn=document.getElementById('themeToggle');if(btn)btn.textContent=t==='dark'?'☀':'☽';const m=document.querySelector('meta[name="theme-color"]');if(m)m.content=t==='dark'?'#1a1612':'#f5f0e8';if(rendition)applyReaderTheme()}
function toggleTheme(){const cur=document.documentElement.dataset.theme||'dark';const next=cur==='dark'?'light':'dark';try{localStorage.setItem('theme',next)}catch(e){}applyTheme(next)}
applyTheme(document.documentElement.dataset.theme||'dark');
const $=id=>document.getElementById(id);
function showView(n){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));$(n+'View').classList.add('active');if(n==='chat'){updateModelPill();if(!currentSessionId)initChat()}if(n==='reading')loadBookshelf();if(n==='whisper'){$('whisperListPanel').style.display='block';$('whisperCompose').classList.remove('show');$('whisperDetail').classList.remove('show');loadWhispers();loadWhisperToggle()}if(n==='day')showDayView();if(n==='diary')showDiaryView()}
function showToast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),1500)}
(function(){const c=$('homeBg'),cols=['#e8c87a','#d4956a','#c07040','#a08450','#8a7e6e'];for(let i=0;i<12;i++){const l=document.createElement('div');l.className='leaf';l.style.left=Math.random()*100+'%';l.style.background=cols[Math.floor(Math.random()*cols.length)];l.style.animationDuration=(10+Math.random()*15)+'s';l.style.animationDelay=Math.random()*12+'s';const s=5+Math.random()*7;l.style.width=s+'px';l.style.height=s+'px';c.appendChild(l)}})();
function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function formatFileMessage(text){if(!text)return null;const headerRe=/---\s+(.+?\.\w+)\s+---/;const m=text.match(headerRe);if(!m)return null;const idx=text.indexOf(m[0]);const userText=text.slice(0,idx).trim();const names=[];const re=/---\s+(.+?\.\w+)\s+---/g;let mm;while((mm=re.exec(text))!==null)names.push(mm[1]);if(!names.length)return null;const tags=names.map(n=>`<div class="attach-file-tag" style="display:inline-flex;margin:2px 4px 2px 0">📄 ${escapeHtml(n)}</div>`).join('');const wrap=`<div style="display:flex;flex-wrap:wrap;margin-bottom:${userText?'6px':'0'}">${tags}</div>`;return wrap+(userText?escapeHtml(userText).replace(/\n/g,'<br>'):'')}
function renderMd(t){return marked.parse(t)}
function fmtTime(ts){if(!ts)return '';const d=new Date(ts*1000);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')}
function fmtTk(n){return n>=1000?(n/1000).toFixed(1)+'k':n.toString()}
function openSidebar(){$('sidebar').classList.add('show');$('sidebarOverlay').classList.add('show')}
function closeSidebar(){$('sidebar').classList.remove('show');$('sidebarOverlay').classList.remove('show')}
async function loadProfile(){try{const r=await fetch('/api/profile');const d=await r.json();$('profileInput').value=d.profile||''}catch(e){}}
async function saveProfile(){try{await fetch('/api/profile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({profile:$('profileInput').value})});const s=$('profileSaved');s.classList.add('show');setTimeout(()=>s.classList.remove('show'),1500)}catch(e){}}
function toggleBmList(){const sl=$('sessionList'),bm=$('thinkingBmList'),lbl=$('bmToggleLabel');const showing=bm.style.display!=='none';if(showing){bm.style.display='none';sl.style.display='block';lbl.textContent='收藏的思考'}else{bm.style.display='block';sl.style.display='none';lbl.textContent='返回会话';loadThinkingBookmarks()}}
async function loadThinkingBookmarks(){if(!currentSessionId){$('thinkingBmList').innerHTML='<div class="bm-empty">未选择会话</div>';return}try{const r=await fetch('/api/thinking/bookmarks?session_id='+encodeURIComponent(currentSessionId));const d=await r.json();const list=$('thinkingBmList');list.innerHTML='';if(!d.bookmarks||!d.bookmarks.length){list.innerHTML='<div class="bm-empty">这个会话还没有收藏的思考</div>';return}d.bookmarks.forEach(b=>{const item=document.createElement('div');item.className='bm-thinking-item';const previewSrc=(b.thinking_content||'').replace(/\s+/g,' ').slice(0,140);const time=fmtDate(b.created_at);const row=document.createElement('div');row.className='bm-row';const t=document.createElement('span');t.className='bm-time';t.textContent=time;const m=document.createElement('span');m.className='bm-msg';m.textContent=b.message_content||'';const del=document.createElement('button');del.className='bm-del';del.textContent='✕';del.onclick=e=>{e.stopPropagation();deleteThinkingBookmark(b.id)};row.appendChild(t);row.appendChild(m);row.appendChild(del);const prev=document.createElement('div');prev.className='bm-preview';prev.textContent=previewSrc;const full=document.createElement('div');full.className='bm-full';full.textContent=b.thinking_content||'';item.appendChild(row);item.appendChild(prev);item.appendChild(full);item.onclick=()=>item.classList.toggle('expanded');list.appendChild(item)})}catch(e){}}
async function deleteThinkingBookmark(id){try{await fetch('/api/thinking/bookmark/'+id,{method:'DELETE'});loadThinkingBookmarks()}catch(e){}}
let sessionsList=[];
async function refreshSessions(){try{const r=await fetch('/api/sessions');sessionsList=(await r.json()).sessions;renderSessionList()}catch(e){}}
function startRename(el,sid){const cur=el.textContent;const input=document.createElement('input');input.className='rename-input';input.value=cur;input.style.cssText='width:100%;background:var(--bg2);color:var(--fg);border:1px solid var(--accent);border-radius:4px;padding:2px 4px;font-size:inherit';let done=false;const save=async()=>{if(done)return;done=true;const nt=input.value.trim();if(nt&&nt!==cur){try{await fetch(`/api/sessions/${sid}/title`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:nt})})}catch(e){}}await refreshSessions()};input.onkeydown=(ev)=>{if(ev.key==='Enter'){ev.preventDefault();save()}else if(ev.key==='Escape'){done=true;refreshSessions()}};input.onblur=save;el.replaceWith(input);input.focus();input.select()}
function renderSessionList(){const el=$('sessionList');el.innerHTML='';sessionsList.forEach(s=>{const d=document.createElement('div');d.className='session-item'+(s.id===currentSessionId?' active':'');const p=document.createElement('span');p.className='preview';p.textContent=s.preview;p.onclick=()=>loadSession(s.id);p.ondblclick=(e)=>{e.stopPropagation();startRename(p,s.id)};let pressTimer=null;p.ontouchstart=(e)=>{pressTimer=setTimeout(()=>{e.preventDefault();startRename(p,s.id)},500)};p.ontouchend=()=>clearTimeout(pressTimer);p.ontouchmove=()=>clearTimeout(pressTimer);p.ontouchcancel=()=>clearTimeout(pressTimer);const x=document.createElement('button');x.className='icon-btn';x.textContent='↓';x.onclick=e=>{e.stopPropagation();exportSession(s.id)};const dl=document.createElement('button');dl.className='icon-btn';dl.textContent='✕';dl.onclick=e=>{e.stopPropagation();deleteSession(s.id)};d.appendChild(p);d.appendChild(x);d.appendChild(dl);el.appendChild(d)})}
async function newChat(){try{const r=await fetch('/api/sessions',{method:'POST'});currentSessionId=(await r.json()).session_id;clearMessages();closeSidebar();await refreshSessions()}catch(e){}}
async function loadSession(sid){currentSessionId=sid;try{const r=await fetch(`/api/sessions/${sid}`);const d=await r.json();clearMessages();d.messages.forEach(m=>{if(typeof m.content!=='string')return;let imgs=null;if(m.images&&m.images.length)imgs=m.images.map(p=>'/api/images/'+p.split(/[\\/]/).pop());const div=addMessage(m.role,m.content,imgs,m.time,m.source);if(m.role==='assistant'&&m.tokens)finalizeAssist(div,m.time,m.tokens)});closeSidebar();renderSessionList();updateCompressHint(d.messages.length);if($('thinkingBmList')&&$('thinkingBmList').style.display!=='none')loadThinkingBookmarks()}catch(e){}}
function updateCompressHint(count){const btn=$('compressBtn');if(!btn)return;if(count>=120){btn.classList.add('nudge');btn.title='上下文有点长了，可以考虑压缩一下'}else{btn.classList.remove('nudge');btn.title='压缩对话历史'}}
function currentMessageCount(){return $('messages')?$('messages').querySelectorAll('.msg').length:0}
async function deleteSession(sid){if(!confirm('确定删除这个对话吗？'))return;try{await fetch(`/api/sessions/${sid}`,{method:'DELETE'});await refreshSessions();if(sid===currentSessionId){if(sessionsList.length>0)await loadSession(sessionsList[0].id);else await newChat()}}catch(e){}}
async function exportSession(sid){try{const r=await fetch(`/api/sessions/${sid}/export`);const data=await r.json();const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`cyrus-chat-${sid}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url)}catch(e){showToast('导出失败')}}
function toggleThinking(){thinkingEnabled=!thinkingEnabled;$('thinkingToggle').classList.toggle('on',thinkingEnabled)}
async function openSummaryModal(){if(!currentSessionId){showToast('没有选中对话');return}$('summaryModal').classList.add('show');await refreshSummaryModal()}
function closeSummaryModal(){$('summaryModal').classList.remove('show')}
async function refreshSummaryModal(){const body=$('summaryModalBody');body.classList.remove('empty');body.textContent='加载中...';try{const r=await fetch('/api/sessions/'+currentSessionId+'/summary');const d=await r.json();const s=(d.summary||'').trim();if(s){body.classList.remove('empty');body.textContent=s}else{body.classList.add('empty');body.textContent='暂无摘要'}}catch(e){body.classList.add('empty');body.textContent='加载失败'}}
async function manualSummarize(){if(!currentSessionId){showToast('没有选中对话');return}const btn=$('summaryGoBtn');if(btn){btn.disabled=true;btn.textContent='压缩中...'}try{const r=await fetch('/api/sessions/'+currentSessionId+'/summarize',{method:'POST'});const d=await r.json();showToast(d.ok?'压缩完成':'压缩失败: '+(d.error||''));if(d.ok){updateCompressHint(0);if($('summaryModal').classList.contains('show'))await refreshSummaryModal()}}catch(e){showToast('压缩失败')}finally{if(btn){btn.disabled=false;btn.textContent='立即压缩'}}}
function updateModelPill(){const el=$('modelPill');if(!el)return;el.textContent=currentModel==='claude-opus-4-6'?'Opus 4.6':'Sonnet 4.6'}
function cycleModel(){currentModel=currentModel==='claude-sonnet-4-6'?'claude-opus-4-6':'claude-sonnet-4-6';updateModelPill();const rs=$('readingModel');if(rs)rs.value=currentModel}
async function handleFiles(fl){for(const f of fl){if(f.type.startsWith('image/')){const du=await resizeImg(f,1024);pendingImages.push({data:du.split(',')[1],media_type:'image/jpeg',preview:du})}else{const t=await readTxt(f);if(t)pendingFiles.push({name:f.name,content:t})}}renderAttach();$('fileInput').value=''}
function resizeImg(f,mx){return new Promise(r=>{const i=new Image();i.onload=()=>{const c=document.createElement('canvas');let w=i.width,h=i.height;if(w>mx||h>mx){if(w>h){h=h*mx/w;w=mx}else{w=w*mx/h;h=mx}}c.width=w;c.height=h;c.getContext('2d').drawImage(i,0,0,w,h);r(c.toDataURL('image/jpeg',.85))};i.src=URL.createObjectURL(f)})}
function readTxt(f){return new Promise(r=>{const rd=new FileReader();rd.onload=e=>{let t=e.target.result;if(t.length>5000)t=t.slice(0,5000)+'\n...(已截断)';r(t)};rd.onerror=()=>r(null);rd.readAsText(f)})}
function renderAttach(){const el=$('attachPreview');el.innerHTML='';el.classList.toggle('show',pendingImages.length>0||pendingFiles.length>0);pendingImages.forEach((img,i)=>{const t=document.createElement('div');t.className='attach-thumb';t.innerHTML=`<img src="${img.preview}"><button class="remove" onclick="removeImg(${i})">✕</button>`;el.appendChild(t)});pendingFiles.forEach((f,i)=>{const t=document.createElement('div');t.className='attach-file-tag';t.innerHTML=`📄 ${escapeHtml(f.name)} <button class="remove" onclick="removeFile(${i})">✕</button>`;el.appendChild(t)})}
function removeImg(i){pendingImages.splice(i,1);renderAttach()}
function removeFile(i){pendingFiles.splice(i,1);renderAttach()}
function clearMessages(){$('messages').innerHTML='<div class="welcome">说点什么吧</div>'}

async function openReader(bookId,title){
    currentBook=bookId;$('readerTitle').textContent=title;
    $('bookshelfPanel').style.display='none';$('readerPanel').style.display='flex';$('readerPanel').style.flexDirection='column';$('readerPanel').style.height='100%';
    $('readerWrap').innerHTML='<div style="text-align:center;padding:40px;color:var(--dim)">正在加载...</div>';
    try{
        const resp=await fetch(`/api/books/${bookId}/file`);const buf=await resp.arrayBuffer();
        $('readerWrap').innerHTML='';await new Promise(r=>setTimeout(r,200));
        const wrapH=$('readerWrap').clientHeight||window.innerHeight-120;
        epubBook=ePub(buf);
        rendition=epubBook.renderTo('readerWrap',{width:'100%',height:wrapH+'px',flow:'paginated',spread:'none'});

        // 用 epub.js 原生主题 API（颜色跟随当前主题）
        applyReaderTheme();

        try{const pr=await fetch(`/api/reading/progress/${bookId}`);const d=await pr.json();if(d.cfi)rendition.display(d.cfi);else rendition.display()}catch(e){rendition.display()}
        rendition.on('relocated',loc=>{
            currentCfi=loc.start.cfi;
            fetch('/api/reading/progress',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({book_id:bookId,cfi:loc.start.cfi,page:loc.start.displayed?loc.start.displayed.page:0})}).catch(()=>{});
            (async()=>{try{
                if(loc.start.cfi&&loc.end&&loc.end.cfi){
                    const sr=await epubBook.getRange(loc.start.cfi);
                    const er=await epubBook.getRange(loc.end.cfi);
                    if(sr&&er&&sr.startContainer.ownerDocument===er.startContainer.ownerDocument){
                        const r=sr.startContainer.ownerDocument.createRange();
                        r.setStart(sr.startContainer,sr.startOffset);
                        r.setEnd(er.startContainer,er.startOffset);
                        const t=r.toString().trim();
                        if(t){currentPageText=t;return}
                    }
                }
                var c=rendition.getContents();if(c.length)currentPageText=c[0].document.body.innerText||''
            }catch(e){try{var c=rendition.getContents();if(c.length)currentPageText=c[0].document.body.innerText||''}catch(e2){}}})();
            if(loc.start.displayed)$('pageInfo').textContent=loc.start.displayed.page+' / '+loc.start.displayed.total;
            try{var href=loc.start.href;if(epubBook&&epubBook.navigation){var found='';epubBook.navigation.toc.forEach(function(t){if(href.indexOf(t.href.split('#')[0])!==-1)found=t.label.trim();if(t.subitems)t.subitems.forEach(function(s){if(href.indexOf(s.href.split('#')[0])!==-1)found=s.label.trim()})});if(found)currentChapter=found}}catch(e){}
            updateBmBtn();
        });
        rendition.on('selected',cfi=>{epubBook.getRange(cfi).then(range=>{selectedText=range.toString();if(selectedText.length>5)$('highlightBar').classList.add('show')}).catch(()=>{})});
        rendition.on('click',()=>{$('highlightBar').classList.remove('show')});
        await loadBookmarks();loadToc();startAutoComment();try{await fetch('/api/reading/init',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({book_id:bookId})})}catch(e){}
    }catch(e){$('readerWrap').innerHTML='<div style="text-align:center;padding:40px;color:var(--warm)">加载失败: '+escapeHtml(e.message)+'</div>'}
}

async function showReadingNotes(){
    $('bookshelfPanel').style.display='none';
    $('readingNotesPanel').style.display='block';
    $('notesContent').innerHTML='<div style="text-align:center;color:var(--gold-m);padding:40px">加载中...</div>';
    try{
        var r=await fetch('/api/reading/favorites');
        var d=await r.json();
        if(!d.books||!d.books.length){
            $('notesContent').innerHTML='<div style="text-align:center;color:var(--gold-m);padding:40px">还没有收藏的感想</div>';
            return;
        }
        var html='';
        d.books.forEach(function(book){
            html+='<div style="margin-bottom:24px">';
            html+='<div style="font-family:\'Noto Serif SC\',serif;font-size:16px;color:var(--gold);margin-bottom:12px;border-bottom:1px solid rgba(232,200,122,.15);padding-bottom:8px">'+escapeHtml(book.title)+'</div>';
            book.favorites.forEach(function(f){
                var chapterTag=f.chapter?'<span style="font-size:11px;color:var(--gold-m);opacity:.7">'+escapeHtml(f.chapter)+'</span><br>':'';
                var contextLine=f.context?'<div style="font-size:12px;color:var(--gold-m);opacity:.5;margin-bottom:4px;font-style:italic">「'+escapeHtml(f.context.substring(0,80))+'...」</div>':'';
                html+='<div style="background:var(--card);border-radius:12px;padding:12px;margin-bottom:8px;position:relative">';
                html+=chapterTag+contextLine;
                html+='<div style="font-size:14px;color:var(--cream)">'+escapeHtml(f.comment)+'</div>';
                html+='<div style="font-size:11px;color:var(--gold-m);opacity:.5;margin-top:6px">'+fmtTime(f.time)+'</div>';
                html+='<button onclick="deleteFavorite('+f.id+',this)" style="position:absolute;top:8px;right:8px;background:none;border:none;color:var(--warm);opacity:.4;cursor:pointer;font-size:12px">✕</button>';
                html+='</div>';
            });
            html+='</div>';
        });
        $('notesContent').innerHTML=html;
    }catch(e){
        $('notesContent').innerHTML='<div style="text-align:center;color:var(--warm);padding:40px">加载失败</div>';
    }
}

function renderBookmarks(){const el=$('bmBody');el.innerHTML='';if(!bookmarks.length){el.innerHTML='<div style="color:var(--dim);padding:20px;text-align:center">还没有书签</div>';return}bookmarks.forEach(b=>{const d=document.createElement('div');d.className='bm-item';d.innerHTML=`<div class="bm-text">${escapeHtml(b.label||'书签')}</div><div class="bm-time">${fmtTime(b.time)}</div>`;d.onclick=()=>{rendition.display(b.cfi);closeDrawer()};const del=document.createElement('button');del.className='bm-del';del.textContent='✕';del.onclick=async e=>{e.stopPropagation();try{await fetch(`/api/reading/bookmarks/${b.id}`,{method:'DELETE'});await loadBookmarks();renderBookmarks();updateBmBtn()}catch(ex){}};d.appendChild(del);el.appendChild(d)})}
async function requestComment(text){if(!text||!currentBook)return;$('commentText').textContent='正在思考...';$('commentTokens').textContent='';$('commentBubble').classList.add('show');try{const r=await fetch('/api/reading/comment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({book_id:currentBook,page_text:text,model:currentModel})});const d=await r.json();showComment(d.comment,d.tokens)}catch(e){}}
async function sendHighlight(){$('highlightBar').classList.remove('show');if(!selectedText||!currentBook)return;try{const r=await fetch('/api/reading/highlight',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({book_id:currentBook,selected_text:selectedText,model:currentModel})});const d=await r.json();showComment(d.comment,d.tokens);selectedText=''}catch(e){}}
let lastCyrusComment='',lastCommentContext='';function showComment(text,tokens){lastCyrusComment=text;$('commentText').textContent=text;$('commentTokens').textContent=tokens?`${tokens.model||''} · 输入 ${fmtTk(tokens.input)} · 输出 ${fmtTk(tokens.output)}` + (tokens.cache_read?` · 缓存读 ${fmtTk(tokens.cache_read)}`:'') + (tokens.cache_write?` · 缓存写 ${fmtTk(tokens.cache_write)}`:''):'';$('commentBubble').classList.add('show');stopAutoComment();}
async function readingGrow(){if(!currentBook)return;var page=0,total=0;var pi=$('pageInfo').textContent;if(pi){var parts=pi.split('/');if(parts.length===2){page=parseInt(parts[0].trim())||0;total=parseInt(parts[1].trim())||0}}var btn=event.target;btn.textContent='存档中...';btn.disabled=true;try{var r=await fetch('/api/reading/grow',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({book_id:currentBook,page:page,total:total,chapter:currentChapter})});var d=await r.json();if(d.ok){btn.textContent='已存档';setTimeout(()=>{btn.textContent='存档';btn.disabled=false},2000)}else{btn.textContent='失败';setTimeout(()=>{btn.textContent='存档';btn.disabled=false},2000)}}catch(e){btn.textContent='存档';btn.disabled=false}}
async function replyComment(){var r=$('commentReply').value.trim();if(!r||!currentBook)return;$('commentReply').value='';$('commentText').textContent='...';try{var resp=await fetch('/api/reading/highlight',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({book_id:currentBook,selected_text:lastCyrusComment,user_message:r,model:currentModel})});var d=await resp.json();$('commentText').textContent=d.comment;lastCyrusComment=d.comment;if(d.tokens)$('commentTokens').textContent=(d.tokens.model||'')+' · 输入 '+fmtTk(d.tokens.input)+' · 输出 '+fmtTk(d.tokens.output)+(d.tokens.cache_read?' · 缓存读 '+fmtTk(d.tokens.cache_read):'')+(d.tokens.cache_write?' · 缓存写 '+fmtTk(d.tokens.cache_write):'')}catch(e){$('commentText').textContent='回复失败'}}
function hideComment(){$('commentReply').value='';$('commentBubble').classList.remove('show');startAutoComment();}

// ══ Whisper (悄悄话) ══
let currentWhisperId=null;
function fmtDate(ts){if(!ts)return '';const d=new Date(ts*1000);const m=(d.getMonth()+1).toString().padStart(2,'0');const day=d.getDate().toString().padStart(2,'0');const h=d.getHours().toString().padStart(2,'0');const mi=d.getMinutes().toString().padStart(2,'0');return m+'/'+day+' '+h+':'+mi}
function statusLabel(s){if(s==='pending')return'等待回复';if(s==='replied')return'等你回复';return'已封存'}
async function loadWhispers(){try{const r=await fetch('/api/whispers');const d=await r.json();const g=$('whisperGrid');g.innerHTML='';if(!d.whispers.length){g.innerHTML='<div class="whisper-empty">还没有悄悄话<br>写一张纸条试试</div>';return}d.whispers.forEach(w=>{const item=document.createElement('div');item.className='whisper-item';const who=w.initiator==='user'?'你':'C';const preview=w.content.length>60?w.content.slice(0,60)+'...':w.content;item.innerHTML='<div class="wi-content">'+escapeHtml(preview)+'</div><div class="wi-footer"><span class="wi-status '+w.status+'">'+statusLabel(w.status)+'</span><span class="wi-time">'+(w.favorited?'✦ ':'')+who+' · '+fmtDate(w.time)+'</span></div>';item.onclick=()=>openWhisperDetail(w);const del=document.createElement('button');del.className='wi-del';del.textContent='✕';del.onclick=e=>{e.stopPropagation();deleteWhisper(w.id)};item.appendChild(del);g.appendChild(item)})}catch(e){}}
function showCompose(){$('whisperListPanel').style.display='none';$('whisperCompose').classList.add('show');$('whisperInput').value='';$('whisperInput').focus()}
function hideCompose(){$('whisperCompose').classList.remove('show');$('whisperListPanel').style.display='block'}
async function sendWhisper(){const t=$('whisperInput').value.trim();if(!t)return;$('composeSend').disabled=true;$('composeSend').textContent='C 正在看...';try{const r=await fetch('/api/whispers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:t})});const d=await r.json();hideCompose();await loadWhispers();if(d.reply1)openWhisperDetail({id:d.id,initiator:'user',content:t,reply1:d.reply1,reply2:'',status:d.status,favorited:false,time:Date.now()/1000})}catch(e){showToast('发送失败')}$('composeSend').disabled=false;$('composeSend').textContent='折好，递过去'}
function openWhisperDetail(w){currentWhisperId=w.id;$('whisperListPanel').style.display='none';$('whisperDetail').classList.add('show');const folds=$('whisperFolds');folds.innerHTML='';const isUser=w.initiator==='user';
const f1=document.createElement('div');f1.className='fold '+(isUser?'user':'ai');f1.innerHTML='<div class="fold-label">'+(isUser?'你写的':'C 写的')+'</div>'+escapeHtml(w.content);folds.appendChild(f1);
if(w.reply1){const f2=document.createElement('div');f2.className='fold '+(isUser?'ai':'user');f2.innerHTML='<div class="fold-label">'+(isUser?'C 回复':'你回复')+'</div>'+escapeHtml(w.reply1);folds.appendChild(f2)}
if(w.reply2){const f3=document.createElement('div');f3.className='fold '+(isUser?'user':'ai');f3.innerHTML='<div class="fold-label">'+(isUser?'你又说':'C 又说')+'</div>'+escapeHtml(w.reply2);folds.appendChild(f3)}
if(w.status==='sealed'){var favBtn=w.favorited?'<span style="color:var(--gold);font-size:16px;margin-top:8px">✦ 已存入</span>':'<button onclick="favoriteWhisper('+w.id+')" id="wFav'+w.id+'" style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;margin-top:8px">✧ 存入记忆</button>';folds.innerHTML+='<div class="sealed-badge">— 已封存 —<br>'+favBtn+'</div>';$('foldReplyArea').style.display='none'}else if(w.status==='replied'&&isUser){$('foldReplyArea').style.display='flex';$('foldReplyInput').placeholder='再说一句，然后封存...';$('foldReplyInput').focus()}else if(w.status==='pending'&&!isUser){$('foldReplyArea').style.display='flex';$('foldReplyInput').placeholder='回复 C 的纸条...';$('foldReplyInput').focus()}else{$('foldReplyArea').style.display='none'}
folds.scrollTop=folds.scrollHeight}
function hideDetail(){$('whisperDetail').classList.remove('show');$('foldReplyArea').style.display='none';$('whisperListPanel').style.display='block';currentWhisperId=null;loadWhispers()}
async function sendFoldReply(){const t=$('foldReplyInput').value.trim();if(!t||!currentWhisperId)return;$('foldReplySend').disabled=true;try{const r=await fetch('/api/whispers/'+currentWhisperId+'/reply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reply:t})});const d=await r.json();$('foldReplyInput').value='';const lr=await fetch('/api/whispers');const ld=await lr.json();const w=ld.whispers.find(x=>x.id===currentWhisperId);if(w)openWhisperDetail(w)}catch(e){showToast('回复失败')}$('foldReplySend').disabled=false}
async function deleteWhisper(id){try{await fetch('/api/whispers/'+id,{method:'DELETE'});loadWhispers()}catch(e){}}
async function favoriteWhisper(id){try{const r=await fetch('/api/whispers/'+id+'/favorite',{method:'POST'});const d=await r.json();if(d.ok){const btn=$('wFav'+id);if(btn){btn.outerHTML='<span style="color:var(--gold);font-size:16px;margin-top:8px">✦ 已存入</span>'}showToast('已存入记忆')}}catch(e){showToast('保存失败')}}
async function loadWhisperToggle(){try{const r=await fetch('/api/whispers/toggle');const d=await r.json();$('whisperToggle').classList.toggle('on',d.enabled)}catch(e){}}
async function toggleWhisperAI(){try{const on=$('whisperToggle').classList.contains('on');const r=await fetch('/api/whispers/toggle',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled:!on})});const d=await r.json();$('whisperToggle').classList.toggle('on',d.enabled);showToast(d.enabled?'C 会给你写纸条':'已关闭')}catch(e){}}

// ══ Cyrus 的一天 ══
let dayCurrentMonth=null,dayCalendarData={},daySelectedDate=null;
function bjToday(){const now=new Date();const bj=new Date(now.getTime()+(now.getTimezoneOffset()+480)*60000);const y=bj.getFullYear(),m=(bj.getMonth()+1).toString().padStart(2,'0'),d=bj.getDate().toString().padStart(2,'0');return{y,m,d,ym:y+'-'+m,ymd:y+'-'+m+'-'+d}}
function pad2(n){return n.toString().padStart(2,'0')}
function showDayView(){const t=bjToday();dayCurrentMonth=dayCurrentMonth||t.ym;daySelectedDate=null;$('dayTimeline').innerHTML='';loadCalendarMonth(dayCurrentMonth);loadKeepaliveToggle();loadKeepaliveModel()}
async function loadKeepaliveToggle(){try{const r=await fetch('/api/keepalive/toggle');const d=await r.json();$('keepaliveToggle').classList.toggle('on',d.enabled)}catch(e){}}
async function toggleKeepaliveAI(){try{const on=$('keepaliveToggle').classList.contains('on');const r=await fetch('/api/keepalive/toggle',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled:!on})});const d=await r.json();$('keepaliveToggle').classList.toggle('on',d.enabled);showToast(d.enabled?'C 会自己醒来':'已关闭')}catch(e){}}
let keepaliveModel='claude-sonnet-4-6';
async function loadKeepaliveModel(){try{const r=await fetch('/api/keepalive/model');const d=await r.json();keepaliveModel=d.model||'claude-sonnet-4-6';updateKaModelPill()}catch(e){}}
function updateKaModelPill(){const el=$('kaModelPill');if(el)el.textContent=keepaliveModel==='claude-opus-4-6'?'Opus':'Sonnet'}
async function cycleKeepaliveModel(){keepaliveModel=keepaliveModel==='claude-sonnet-4-6'?'claude-opus-4-6':'claude-sonnet-4-6';updateKaModelPill();try{await fetch('/api/keepalive/model',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:keepaliveModel})});showToast(keepaliveModel==='claude-opus-4-6'?'Keepalive: Opus':'Keepalive: Sonnet')}catch(e){showToast('切换失败')}}
async function loadCalendarMonth(yearMonth){dayCurrentMonth=yearMonth;const[y,m]=yearMonth.split('-').map(Number);$('dayMonthLabel').textContent=y+'年'+m+'月';let data={},totals={input_tokens:0,output_tokens:0};try{const r=await fetch('/api/keepalive/calendar?month='+yearMonth);const d=await r.json();data=d.days||{};totals=d.totals||totals}catch(e){}dayCalendarData=data;const tin=totals.input_tokens||0,tout=totals.output_tokens||0;$('dayMonthTotal').textContent=(tin||tout)?`本月合计：入 ${fmtTk(tin)} · 出 ${fmtTk(tout)}`:'';renderCalendarGrid(y,m)}
function renderCalendarGrid(y,m){const grid=$('dayCalGrid');grid.innerHTML='';const heads=['一','二','三','四','五','六','日'];heads.forEach(h=>{const el=document.createElement('div');el.className='cal-head';el.textContent=h;grid.appendChild(el)});const first=new Date(y,m-1,1);let leadDow=first.getDay();leadDow=leadDow===0?6:leadDow-1;for(let i=0;i<leadDow;i++){const e=document.createElement('div');e.className='cal-cell empty';grid.appendChild(e)}const last=new Date(y,m,0).getDate();const today=bjToday();for(let d=1;d<=last;d++){const dateStr=y+'-'+pad2(m)+'-'+pad2(d);const cell=document.createElement('div');cell.className='cal-cell';cell.textContent=d;if(dayCalendarData[dateStr])cell.classList.add('has-activity');if(dateStr===today.ymd)cell.classList.add('today');if(dateStr===daySelectedDate)cell.classList.add('selected');cell.onclick=()=>{daySelectedDate=dateStr;document.querySelectorAll('.cal-cell.selected').forEach(c=>c.classList.remove('selected'));cell.classList.add('selected');loadDayLogs(dateStr)};grid.appendChild(cell)}if(Object.keys(dayCalendarData).length===0)$('dayTimeline').innerHTML='<div class="day-empty">这个月还没有记录</div>'}
async function loadDayLogs(date){const tl=$('dayTimeline');tl.innerHTML='<div class="day-empty">加载中...</div>';try{const r=await fetch('/api/keepalive/logs?date='+date);const d=await r.json();const logs=d.logs||[];if(!logs.length){tl.innerHTML='<div class="day-empty">这天没有醒来记录</div>';return}tl.innerHTML='';logs.forEach(l=>{const item=document.createElement('div');item.className='tl-item';const tagText={none:'什么都没做',message:'发了消息',diary:'写了日记',whisper:'写了悄悄话',explore:'探索了一下'}[l.action]||'其它';const row=document.createElement('div');row.className='tl-row';let html='<div class="tl-time">'+escapeHtml(l.time)+'</div><div class="tl-thoughts">'+escapeHtml(l.thoughts||'')+'</div><div class="tl-tag '+l.action+'">'+tagText+'</div>';const tin=l.input_tokens||0,tout=l.output_tokens||0;if(tin||tout)html+='<div class="tl-tokens">入'+fmtTk(tin)+' 出'+fmtTk(tout)+'</div>';row.innerHTML=html;item.appendChild(row);if(l.content){const ce=document.createElement('div');ce.className='tl-content';ce.textContent=l.content;item.appendChild(ce);item.onclick=()=>ce.classList.toggle('show')}else{item.style.cursor='default'}tl.appendChild(item)})}catch(e){tl.innerHTML='<div class="day-empty">加载失败</div>'}}
function shiftMonth(delta){const[y,m]=dayCurrentMonth.split('-').map(Number);let ny=y,nm=m+delta;if(nm<1){nm=12;ny--}if(nm>12){nm=1;ny++}daySelectedDate=null;$('dayTimeline').innerHTML='';loadCalendarMonth(ny+'-'+pad2(nm))}
function prevMonth(){shiftMonth(-1)}
function nextMonth(){shiftMonth(1)}

// ══ 日记 ══
async function showDiaryView(){loadDiaries()}
async function loadDiaries(){const list=$('diaryList');list.innerHTML='<div class="diary-empty">加载中...</div>';try{const r=await fetch('/api/diary');const d=await r.json();const dates=d.dates||[];if(!dates.length){list.innerHTML='<div class="diary-empty">还没有日记<br>等他想写的时候</div>';return}const results=await Promise.all(dates.map(date=>fetch('/api/diary?date='+date).then(r=>r.json()).then(j=>({date,diaries:j.diaries||[]}))));list.innerHTML='';const monthNames=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];results.forEach(group=>{const[y,m,dd]=group.date.split('-').map(Number);const dateLabel=monthNames[m-1]+dd+'日';group.diaries.forEach(diary=>{const e=document.createElement('div');e.className='diary-entry';const head=document.createElement('div');head.className='de-date';head.innerHTML=escapeHtml(dateLabel)+'<span class="de-time">'+escapeHtml(diary.time||'')+'</span>';const body=document.createElement('div');body.className='de-content';body.textContent=diary.content||'';e.appendChild(head);e.appendChild(body);list.appendChild(e)})})}catch(e){list.innerHTML='<div class="diary-empty">加载失败</div>'}}

// ══ Push 通知 ══
function urlBase64ToUint8Array(base64String){const padding='='.repeat((4-base64String.length%4)%4);const base64=(base64String+padding).replace(/-/g,'+').replace(/_/g,'/');const raw=window.atob(base64);const arr=new Uint8Array(raw.length);for(let i=0;i<raw.length;++i)arr[i]=raw.charCodeAt(i);return arr}
function arrayBufferToB64u(buf){const bytes=new Uint8Array(buf);let bin='';for(let i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}
async function getServerVapidKey(){try{const r=await fetch('/api/push/vapid-key');const{publicKey}=await r.json();return publicKey||''}catch(e){return ''}}
async function subscribePush(){if(!('serviceWorker' in navigator)||!('PushManager' in window))return false;if(!('Notification' in window))return false;try{console.log('subscribePush: current permission=',Notification.permission);const perm=await Notification.requestPermission();console.log('subscribePush: permission result=',perm);if(perm!=='granted'){console.log('subscribePush: not granted, abort');return false}const reg=await navigator.serviceWorker.register('/sw.js');const publicKey=await getServerVapidKey();if(!publicKey)return false;const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array(publicKey)});const j=sub.toJSON();await fetch('/api/push/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({endpoint:j.endpoint,keys:j.keys})});return true}catch(e){console.log('subscribe failed:',e);return false}}
async function unsubscribePush(){if(!('serviceWorker' in navigator)||!('PushManager' in window))return false;try{const reg=await navigator.serviceWorker.getRegistration('/sw.js');if(!reg)return true;const sub=await reg.pushManager.getSubscription();if(!sub)return true;const endpoint=sub.endpoint;await sub.unsubscribe();try{await fetch('/api/push/subscribe',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({endpoint})})}catch(e){}return true}catch(e){console.log('unsubscribe failed:',e);return false}}
async function initPush(){if(!('serviceWorker' in navigator)||!('PushManager' in window)){markPushOff();return}try{const reg=await navigator.serviceWorker.register('/sw.js');let sub=await reg.pushManager.getSubscription();if(sub){const serverKey=await getServerVapidKey();const subKeyBuf=sub.options&&sub.options.applicationServerKey;if(serverKey&&subKeyBuf){const subKeyB64=arrayBufferToB64u(subKeyBuf);if(subKeyB64!==serverKey){console.log('VAPID key changed, re-subscribing');const oldEp=sub.endpoint;try{await sub.unsubscribe()}catch(e){}try{await fetch('/api/push/subscribe',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({endpoint:oldEp})})}catch(e){}sub=null}}}if(sub){markPushOn();return}if(('Notification' in window)&&Notification.permission==='granted'){const ok=await subscribePush();if(ok){markPushOn();return}}markPushOff()}catch(e){console.log('initPush error:',e);markPushOff()}}
function markPushOn(){const el=$('pushLink');if(!el)return;el.textContent='关闭通知';el.style.opacity='1';el.style.cursor='pointer';el.onclick=onPushClick}
function markPushOff(){const el=$('pushLink');if(!el)return;el.textContent='开启通知';el.style.opacity='1';el.style.cursor='pointer';el.onclick=onPushClick}
async function onPushClick(){if(!('Notification' in window)){showToast('浏览器不支持通知');return}if(!('serviceWorker' in navigator)||!('PushManager' in window)){showToast('浏览器不支持推送');return}const reg=await navigator.serviceWorker.getRegistration('/sw.js').catch(()=>null);const existing=reg?await reg.pushManager.getSubscription().catch(()=>null):null;if(existing){const ok=await unsubscribePush();if(ok){markPushOff();showToast('已关闭通知')}else{showToast('关闭失败')}return}if(Notification.permission==='denied'){showToast('已被禁用，请去系统设置开启');return}if(Notification.permission!=='granted'){const p=await Notification.requestPermission();if(p!=='granted'){showToast('未授权');return}}const ok=await subscribePush();if(ok){markPushOn();showToast('已开启通知')}else{showToast('订阅失败')}}
async function refreshPushStatus(){await initPush()}

initChat();
refreshPushStatus();

// ═══ 网络状态检测 ═══
let _wasOffline = false;
function updateOnlineStatus() {
    const banner = $('offlineBanner');
    if (!navigator.onLine) {
        banner.classList.add('show');
        _wasOffline = true;
    } else {
        banner.classList.remove('show');
        if (_wasOffline) {
            showToast('网络已恢复');
            _wasOffline = false;
        }
    }
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();
