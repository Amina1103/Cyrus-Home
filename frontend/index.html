<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cyrus">
    <meta name="theme-color" content="#1a1612">
    <title>Cyrus</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-deep: #1a1612;
            --bg-card: #2a2520;
            --bg-input: #231f1a;
            --gold: #e8c87a;
            --gold-muted: #a08450;
            --cream: #e5ddd0;
            --cream-dim: #8a7e6e;
            --warm: #d4956a;
            --bubble-mine: #3a3228;
            --bubble-his: #1f1b17;
        }

        html, body {
            height: 100%;
            background: var(--bg-deep);
            color: var(--cream);
            font-family: 'Noto Serif SC', serif;
            overflow: hidden;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            height: 100dvh;
        }

        /* 顶栏 */
        .header {
            padding: 16px 20px;
            padding-top: max(16px, env(safe-area-inset-top));
            text-align: center;
            border-bottom: 1px solid rgba(232, 200, 122, 0.1);
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 2px;
        }

        /* 消息区 */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .messages::-webkit-scrollbar {
            display: none;
        }

        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.7;
            animation: fadeUp 0.25s ease-out;
            word-break: break-word;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            align-self: flex-end;
            background: var(--bubble-mine);
            border-bottom-right-radius: 4px;
            color: var(--cream);
        }

        .msg.assistant {
            align-self: flex-start;
            background: var(--bubble-his);
            border-bottom-left-radius: 4px;
            color: var(--cream);
            border: 1px solid rgba(232, 200, 122, 0.06);
        }

        /* 打字指示器 */
        .typing {
            align-self: flex-start;
            padding: 12px 20px;
            display: none;
        }

        .typing.show { display: flex; gap: 5px; }

        .typing span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gold-muted);
            animation: pulse 1.2s ease-in-out infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.15s; }
        .typing span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes pulse {
            0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
            30% { opacity: 1; transform: scale(1); }
        }

        /* 输入栏 */
        .input-bar {
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            border-top: 1px solid rgba(232, 200, 122, 0.08);
            background: var(--bg-deep);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .input-bar textarea {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid rgba(232, 200, 122, 0.12);
            border-radius: 22px;
            padding: 10px 18px;
            font-size: 15px;
            font-family: 'Noto Serif SC', serif;
            color: var(--cream);
            resize: none;
            max-height: 120px;
            line-height: 1.5;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-bar textarea::placeholder {
            color: var(--cream-dim);
        }

        .input-bar textarea:focus {
            border-color: rgba(232, 200, 122, 0.3);
        }

        .input-bar button {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: var(--gold);
            color: var(--bg-deep);
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s, transform 0.1s;
        }

        .input-bar button:active {
            transform: scale(0.92);
        }

        .input-bar button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* 欢迎状态 */
        .welcome {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--cream-dim);
            font-size: 14px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>C</h1>
        </div>
        <div class="messages" id="messages">
            <div class="welcome" id="welcome">说点什么吧</div>
        </div>
        <div class="typing" id="typing">
            <span></span><span></span><span></span>
        </div>
        <div class="input-bar">
            <textarea id="input" rows="1" placeholder="..."></textarea>
            <button id="send" onclick="sendMessage()">↑</button>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const typingEl = document.getElementById('typing');
        const welcomeEl = document.getElementById('welcome');

        // 自动调整输入框高度
        inputEl.addEventListener('input', () => {
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
        });

        // 回车发送，Shift+回车换行
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function addMessage(role, text) {
            if (welcomeEl) welcomeEl.remove();
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.textContent = text;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;

            inputEl.value = '';
            inputEl.style.height = 'auto';
            sendBtn.disabled = true;

            addMessage('user', text);

            typingEl.classList.add('show');
            messagesEl.scrollTop = messagesEl.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                typingEl.classList.remove('show');
                addMessage('assistant', data.reply);
            } catch (err) {
                typingEl.classList.remove('show');
                addMessage('assistant', '连接断了...再试一次？');
            }

            sendBtn.disabled = false;
            inputEl.focus();
        }
    </script>
</body>
</html>
